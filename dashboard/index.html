<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Video Factory — Live Dashboard</title>
<style>
  :root {
    --page:      #f9f9f7;
    --surface:   #fcfcfb;
    --ink:       #0b0b0b;
    --ink-2:     #52514e;
    --muted:     #898781;
    --grid:      #e1e0d9;
    --baseline:  #c3c2b7;
    --border:    rgba(11,11,11,0.10);
    --series-1:  #2a78d6;
    --good:      #0ca30c;
    --warning:   #fab219;
    --critical:  #d03b3b;
    --good-text: #006300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:      #0d0d0d;
      --surface:   #1a1a19;
      --ink:       #ffffff;
      --ink-2:     #c3c2b7;
      --muted:     #898781;
      --grid:      #2c2c2a;
      --baseline:  #383835;
      --border:    rgba(255,255,255,0.10);
      --series-1:  #3987e5;
      --good-text: #0ca30c;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page); color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 20px; max-width: 1200px; margin: 0 auto;
  }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  header h1 { font-size: 18px; font-weight: 700; }
  #conn { display: inline-flex; align-items: center; gap: 6px; color: var(--ink-2); font-size: 12px; }
  #conn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #conn.ok .dot { background: var(--good); }
  #conn.err .dot { background: var(--critical); }

  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .tile { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .tile .v { font-size: 30px; font-weight: 700; line-height: 1.1; }
  .tile .l { color: var(--ink-2); font-size: 12px; margin-top: 2px; }
  .tile .s { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  .panel h2 { font-size: 13px; font-weight: 700; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; }

  /* Pipeline map */
  .pipe { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
  .node { flex: 1; min-width: 92px; border: 1px solid var(--grid); border-radius: 8px; padding: 8px 9px; position: relative; }
  .node .name { font-size: 12px; font-weight: 600; color: var(--ink-2); }
  .node.on { border-color: var(--series-1); box-shadow: inset 0 0 0 1px var(--series-1); }
  .node.on .name { color: var(--ink); }
  .chip { display: inline-flex; align-items: center; gap: 5px; margin-top: 6px; padding: 2px 8px; border-radius: 999px;
          background: var(--series-1); color: #fff; font-size: 11px; font-weight: 600; max-width: 100%; }
  .chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lanes { display: flex; gap: 6px; margin-top: 8px; }
  .lanes .node { flex: 0 0 auto; min-width: 120px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase;
       letter-spacing: 0.04em; padding: 4px 10px 6px 0; border-bottom: 1px solid var(--grid); }
  td { padding: 7px 10px 7px 0; border-bottom: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: 0; }
  .state { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }
  .state::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .state.active::before { background: var(--good); }
  .state.stale::before  { background: var(--warning); }
  .empty { color: var(--muted); padding: 10px 0; }

  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px) { .cols { grid-template-columns: 1fr; } }

  /* Scores chart */
  .chart { position: relative; }
  .chart svg { display: block; width: 100%; height: 190px; }
  .bar { fill: var(--series-1); }
  .bar:hover { opacity: 0.85; }
  .gridline { stroke: var(--grid); stroke-width: 1; }
  .thresh { stroke: var(--ink-2); stroke-width: 1.5; stroke-dasharray: 4 3; }
  .axis-label, .bar-label { font: 11px system-ui, sans-serif; fill: var(--muted); }
  .bar-label { fill: var(--ink-2); font-weight: 600; }
  #tip { position: fixed; pointer-events: none; background: var(--surface); border: 1px solid var(--border);
         border-radius: 8px; padding: 8px 10px; font-size: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.18);
         display: none; z-index: 10; }
  #tip b { display: block; }

  .runline { font-size: 12px; color: var(--ink-2); padding: 5px 0; border-bottom: 1px solid var(--grid);
             font-variant-numeric: tabular-nums; word-break: break-all; }
  .runline:last-child { border-bottom: 0; }

  .ev { display: flex; align-items: baseline; gap: 8px; font-size: 12px; padding: 4px 0;
        border-bottom: 1px solid var(--grid); }
  .ev:last-child { border-bottom: 0; }
  .ev .t { color: var(--muted); font-variant-numeric: tabular-nums; flex: 0 0 60px; }
  .ev .badge { flex: 0 0 76px; font-weight: 700; }
  .ev .badge.started  { color: var(--series-1); }
  .ev .badge.section  { color: var(--ink-2); font-weight: 600; }
  .ev .badge.finished { color: var(--good-text); }
  .ev .badge.stopped  { color: var(--ink-2); }
  .ev .badge.failed   { color: var(--critical); }
  .ev .d { color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Control panel */
  .ctl textarea {
    width: 100%; resize: vertical; background: var(--page); color: var(--ink);
    border: 1px solid var(--grid); border-radius: 8px; padding: 10px 12px;
    font: 13px/1.4 system-ui, sans-serif;
  }
  .ctl textarea:focus { outline: none; border-color: var(--series-1); }
  .ctl-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .btn {
    border: 1px solid var(--grid); background: var(--page); color: var(--ink);
    border-radius: 8px; padding: 7px 14px; font: 600 13px system-ui, sans-serif; cursor: pointer;
  }
  .btn:hover { border-color: var(--series-1); }
  .btn.primary { background: var(--series-1); border-color: var(--series-1); color: #fff; }
  .btn.stop { color: var(--critical); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  select {
    border: 1px solid var(--grid); background: var(--page); color: var(--ink);
    border-radius: 8px; padding: 7px 10px; font: 13px system-ui, sans-serif;
  }
  #ctl-msg { font-size: 12px; color: var(--ink-2); }
  #ctl-msg.err { color: var(--critical); }
  .job { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding: 8px 10px;
         border: 1px solid var(--grid); border-radius: 8px; font-size: 12px; }
  .job .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--good);
                animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .job .jd { flex: 1; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .job .jd b { color: var(--ink); }
  .qchip { display: inline-block; padding: 1px 8px; border-radius: 999px; border: 1px solid var(--grid);
           font-size: 11px; color: var(--ink-2); margin: 2px 4px 2px 0; }
  .qchip b { color: var(--ink); }
</style>
</head>
<body>
<header>
  <h1>🎬 Video Factory</h1>
  <div id="conn"><span class="dot"></span><span id="conn-t">connecting…</span></div>
</header>

<div class="panel">
  <h2>Control — start, stop, and prompt the loop</h2>
  <div class="ctl">
    <textarea id="ctl-prompt" rows="2"
      placeholder="Tell the loop what to do… e.g. “Make a vertical video about why clinics should measure AI time savings” or “Go find fresh topics about clinical AI”."></textarea>
    <div class="ctl-row">
      <select id="ctl-format">
        <option value="">format: auto</option>
        <option value="vertical">vertical</option>
        <option value="landscape">landscape</option>
        <option value="square">square</option>
      </select>
      <button class="btn primary" id="btn-prompt">▶ Run prompt (AI)</button>
      <button class="btn" id="btn-scout">🔍 Scout topics (AI)</button>
      <button class="btn" id="btn-pending">▶ Run next pending (no AI)</button>
      <span id="ctl-msg"></span>
    </div>
    <div id="jobs"></div>
  </div>
</div>

<div class="tiles" id="tiles"></div>

<div class="panel">
  <h2>Architecture — where agents are working</h2>
  <div class="pipe" id="pipe"></div>
  <div class="lanes" id="lanes"></div>
</div>

<div class="panel">
  <h2>Agents</h2>
  <div id="agents"></div>
</div>

<div class="panel">
  <h2>Activity — starts, section moves, finishes, stops</h2>
  <div id="events"></div>
</div>

<div class="cols">
  <div class="panel chart">
    <h2>Virality score per run (threshold dashed)</h2>
    <div id="chart"></div>
  </div>
  <div class="panel">
    <h2>Recent runs</h2>
    <div id="runs"></div>
    <h2 style="margin-top:14px">Queue</h2>
    <div id="queue"></div>
  </div>
</div>
<div id="tip"></div>

<script>
const SECTIONS = [
  ["preflight", "Preflight"], ["entry", "Entry / Pick"], ["voice", "Voice + Transcript"],
  ["build", "Brief / Build"], ["render", "Render"], ["qa", "QA / Enforce"],
  ["score", "Score (R15)"], ["improve", "Improve Loop"], ["close", "Close"],
];
const LANES = [["scout", "Scout (Mode C)"], ["consolidate", "Consolidate"], ["agentic", "Agentic Loop"]];
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function tile(v, l, s) {
  return `<div class="tile"><div class="v">${v}</div><div class="l">${l}</div>${s ? `<div class="s">${s}</div>` : ""}</div>`;
}

function nodeHtml(key, name, agents) {
  const here = agents.filter((a) => a.section === key && a.state !== "offline");
  const chips = here.map((a) =>
    `<div class="chip" title="${esc(a.agent)}: ${esc(a.step)}"><span>${esc(a.agent.split("-")[0])}${a.item ? " · " + esc(a.item) : ""}</span></div>`
  ).join("");
  return `<div class="node ${here.length ? "on" : ""}"><div class="name">${name}</div>${chips}</div>`;
}

function renderChart(metrics, threshold) {
  const el = document.getElementById("chart");
  if (!metrics.length) { el.innerHTML = '<div class="empty">No runs recorded yet.</div>'; return; }
  const W = 520, H = 190, padL = 30, padB = 26, padT = 12;
  const plotW = W - padL - 8, plotH = H - padT - padB;
  const max = 100;
  const bw = Math.min(34, plotW / metrics.length - 8);
  const y = (v) => padT + plotH * (1 - v / max);
  let s = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Best virality score per run">`;
  for (const g of [0, 25, 50, 75, 100]) {
    s += `<line class="gridline" x1="${padL}" x2="${W - 8}" y1="${y(g)}" y2="${y(g)}"/>`;
    s += `<text class="axis-label" x="${padL - 6}" y="${y(g) + 4}" text-anchor="end">${g}</text>`;
  }
  metrics.forEach((m, i) => {
    const x = padL + (plotW / metrics.length) * i + (plotW / metrics.length - bw) / 2;
    const h = plotH * (m.best_score / max);
    s += `<path class="bar" data-i="${i}" d="M${x},${y(0)} v${-h + 4} q0,-4 4,-4 h${bw - 8} q4,0 4,4 v${h - 4} z"/>`;
    s += `<text class="bar-label" x="${x + bw / 2}" y="${y(m.best_score) - 5}" text-anchor="middle">${m.best_score}</text>`;
    s += `<text class="axis-label" x="${x + bw / 2}" y="${H - 8}" text-anchor="middle">${esc(String(m.id).slice(0, 9))}</text>`;
  });
  s += `<line class="thresh" x1="${padL}" x2="${W - 8}" y1="${y(threshold)}" y2="${y(threshold)}"/>`;
  s += `</svg>`;
  el.innerHTML = s;
  const tip = document.getElementById("tip");
  el.querySelectorAll(".bar").forEach((b) => {
    b.addEventListener("mousemove", (e) => {
      const m = metrics[Number(b.dataset.i)];
      tip.innerHTML = `<b>${esc(m.id)}</b>score ${m.best_score} (Δ ${m.score_delta >= 0 ? "+" : ""}${m.score_delta})<br>` +
        `regens ${m.regenerations} · ${m.render_minutes} min<br>${m.published ? "✓ would publish" : "⏸ human review"}`;
      tip.style.display = "block";
      tip.style.left = Math.min(e.clientX + 12, innerWidth - 190) + "px";
      tip.style.top = (e.clientY + 12) + "px";
    });
    b.addEventListener("mouseleave", () => (tip.style.display = "none"));
  });
}

// ---- Control panel ----
const msg = (t, err) => {
  const el = document.getElementById("ctl-msg");
  el.textContent = t; el.className = err ? "err" : "";
  if (t) setTimeout(() => { if (el.textContent === t) el.textContent = ""; }, 8000);
};
async function api(path, payload) {
  try {
    const r = await fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
    const j = await r.json();
    if (!r.ok) { msg(j.error ?? "request failed", true); return null; }
    return j;
  } catch { msg("server unreachable", true); return null; }
}
async function startJob(type) {
  const prompt = document.getElementById("ctl-prompt").value;
  const format = document.getElementById("ctl-format").value || undefined;
  const r = await api("/api/start", { type, prompt, format });
  if (r) { msg(`started ${r.jobId} — ${r.detail}`); if (type === "prompt") document.getElementById("ctl-prompt").value = ""; tick(); }
}
document.getElementById("btn-prompt").addEventListener("click", () => {
  if (!document.getElementById("ctl-prompt").value.trim()) return msg("type a request first", true);
  startJob("prompt");
});
document.getElementById("btn-scout").addEventListener("click", () => startJob("scout"));
document.getElementById("btn-pending").addEventListener("click", () => startJob("pending"));
async function stopJob(jobId) {
  const r = await api("/api/stop", { jobId });
  if (r) { msg(`stop signal sent to ${jobId}`); tick(); }
}

function renderJobs(jobsList) {
  const el = document.getElementById("jobs");
  el.innerHTML = (jobsList ?? []).map((j) => {
    const mins = Math.round((Date.now() - Date.parse(j.startedAt)) / 60000);
    return `<div class="job"><span class="pulse"></span>` +
      `<span class="jd"><b>${esc(j.jobId)}</b> · ${esc(j.detail)} · ${mins} min</span>` +
      `<button class="btn stop" onclick="stopJob('${esc(j.jobId)}')">⏹ Stop</button></div>`;
  }).join("");
}

function render(d) {
  renderJobs(d.jobs);
  const live = d.agents.filter((a) => a.state === "active");
  const q = d.queue.counts;
  const pubRate = d.metrics.length
    ? Math.round((100 * d.metrics.filter((m) => m.published).length) / d.metrics.length) + "%" : "—";
  document.getElementById("tiles").innerHTML =
    tile(live.length, "agents active", d.agents.length > live.length ? `${d.agents.length - live.length} stale` : "") +
    tile(q.pending ?? 0, "pending") +
    tile(q.in_progress ?? 0, "in progress") +
    tile((q.needs_approval ?? 0) + d.humanReview.length + d.proposals, "awaiting human",
         `${q.needs_approval ?? 0} drafts · ${d.humanReview.length} review · ${d.proposals} proposals`) +
    tile(q.done ?? 0, "done") +
    tile(d.gates.threshold, "publish threshold", `regen cap ${d.gates.regenCap}`);

  document.getElementById("pipe").innerHTML = SECTIONS.map(([k, n]) => nodeHtml(k, n, d.agents)).join("");
  document.getElementById("lanes").innerHTML = LANES.map(([k, n]) => nodeHtml(k, n, d.agents)).join("");

  const ag = document.getElementById("agents");
  if (!d.agents.length) ag.innerHTML = '<div class="empty">No agents running. Start one: <code>scripts/make_video.sh</code>, <code>run_loop.sh</code>, <code>scripts/scout.sh</code>.</div>';
  else ag.innerHTML = `<table><tr><th>State</th><th>Agent</th><th>Item</th><th>Mode/Fmt</th><th>Section</th><th>Step</th><th>Beat</th></tr>` +
    d.agents.map((a) => `<tr>
      <td><span class="state ${a.state}">${a.state}</span></td>
      <td>${esc(a.agent)}</td><td>${esc(a.item ?? "—")}</td>
      <td>${esc(a.mode ?? "—")}${a.format ? "/" + esc(a.format) : ""}</td>
      <td>${esc(a.section)}</td><td>${esc(a.step)}</td><td>${a.ageSec}s ago</td></tr>`).join("") + "</table>";

  const ICONS = { started: "▶", section: "→", finished: "✓", stopped: "⏹", failed: "✕" };
  document.getElementById("events").innerHTML = (d.events ?? []).length
    ? d.events.map((e) => {
        const t = new Date(e.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        const who = esc(e.agent.split("-")[0]) + (e.item ? " · " + esc(e.item) : "");
        const what = e.type === "section" ? `${esc(e.section)}${e.step ? " — " + esc(e.step) : ""}`
                   : e.note ? esc(e.note) : e.section ? "in " + esc(e.section) : "";
        return `<div class="ev"><span class="t">${t}</span>` +
               `<span class="badge ${esc(e.type)}">${ICONS[e.type] ?? "•"} ${esc(e.type)}</span>` +
               `<span class="d"><b>${who}</b>&nbsp; ${what}</span></div>`;
      }).join("")
    : '<div class="empty">No activity yet — events appear when an agent starts.</div>';

  renderChart(d.metrics, d.gates.threshold);

  document.getElementById("runs").innerHTML = d.production.length
    ? d.production.map((l) => `<div class="runline">${esc(l)}</div>`).join("")
    : '<div class="empty">No production log yet.</div>';

  document.getElementById("queue").innerHTML = d.queue.items
    .map((t) => `<span class="qchip"><b>${esc(t.id)}</b> ${esc(t.status)}</span>`).join("") || '<div class="empty">Queue empty.</div>';
}

async function tick() {
  const conn = document.getElementById("conn");
  try {
    const r = await fetch("/status.json", { cache: "no-store" });
    render(await r.json());
    conn.className = "ok";
    document.getElementById("conn-t").textContent = "live · " + new Date().toLocaleTimeString();
  } catch {
    conn.className = "err";
    document.getElementById("conn-t").textContent = "server unreachable";
  }
}
tick();
setInterval(tick, 2000);
</script>
</body>
</html>
