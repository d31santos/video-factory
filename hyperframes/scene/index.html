<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px; overflow: hidden;
        background: #0b0b0f; font-family: "Inter", system-ui, sans-serif;
      }
      .wrap {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 40px; padding: 120px;
        background: radial-gradient(120% 120% at 50% 25%, #00e0b822 0%, #0b0b0f 68%);
      }
      .kicker { color: #00e0b8; font-size: 44px; font-weight: 800; letter-spacing: 6px; }
      .headline { color: #ffffff; font-size: 96px; font-weight: 900; text-align: center; line-height: 1.05; }
      .accent { color: #ffd400; }
      .rule { width: 220px; height: 10px; border-radius: 6px; background: #ffd400; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="card"
        class="clip"
        data-start="0"
        data-duration="4"
        data-track-index="1"
      >
        <div class="wrap">
          <div class="kicker" id="kicker">HYPERFRAMES</div>
          <div class="headline">Fast HTML scenes,<br /><span class="accent">rendered as video</span></div>
          <div class="rule" id="rule"></div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.from("#kicker", { opacity: 0, y: -30, duration: 0.6 }, 0)
        .from(".headline", { opacity: 0, y: 30, duration: 0.7 }, 0.2)
        .from("#rule", { scaleX: 0, transformOrigin: "left center", duration: 0.6 }, 0.5);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
